<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3ASBA Chaos Game</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Bungee', cursive;
    background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 1400% 1400%;
    animation: rainbowBG 10s ease infinite;
    overflow: hidden;
}

@keyframes rainbowBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h2 {
    color: white;
    margin-bottom: 30px;
    text-shadow: 3px 3px 0 black;
}

#letters {
    display: flex;
    gap: 20px;
}

.letter {
    font-size: 8vw;
    padding: 20px 30px;
    background: white;
    border-radius: 20px;
    cursor: grab;
    user-select: none;
    box-shadow: 0 10px 0 rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

.letter:active {
    cursor: grabbing;
    transform: scale(1.2);
}

.correct {
    animation: dance 0.5s infinite alternate;
}

@keyframes dance {
    from { transform: rotate(-10deg) scale(1.1); }
    to { transform: rotate(10deg) scale(1.2); }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<h2>🎪 Drag the letters to form: 3ASBA 🎪</h2>

<div id="letters"></div>

<script>
const correctOrder = ["3", "A", "S", "B", "A"];
let letters = ["A", "3", "B", "A", "S"]; // shuffled start

const container = document.getElementById("letters");

function render() {
    container.innerHTML = "";
    letters.forEach((letter, index) => {
        const div = document.createElement("div");
        div.className = "letter";
        div.textContent = letter;
        div.draggable = true;

        div.addEventListener("dragstart", () => {
            div.classList.add("dragging");
        });

        div.addEventListener("dragend", () => {
            div.classList.remove("dragging");
        });

        div.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        div.addEventListener("drop", () => {
            const draggingIndex = letters.findIndex(l => 
                document.querySelector(".dragging").textContent === l
            );
            const temp = letters[index];
            letters[index] = letters[draggingIndex];
            letters[draggingIndex] = temp;
            render();
            checkWin();
        });

        container.appendChild(div);
    });
}

function checkWin() {
    if (letters.join("") === correctOrder.join("")) {
        document.querySelectorAll(".letter").forEach(l => {
            l.classList.add("correct");
        });
        crazyCelebration();
    }
}

function crazyCelebration() {
    for (let i = 0; i < 150; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = "-10px";
        confetti.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
        confetti.style.width = confetti.style.height = 
            (Math.random() * 10 + 5) + "px";
        confetti.style.animationDuration = 
            (Math.random() * 2 + 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
    }
}

render();
</script>

</body>
</html>
